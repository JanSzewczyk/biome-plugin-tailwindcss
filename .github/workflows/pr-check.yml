name: PR Checks ✅

on:
  pull_request:

env:
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  biome:
    name: Biome 🌿
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v4
      - name: Setup Biome 🌿
        uses: biomejs/setup-biome@v2
      - name: Biome CI 🌿
        run: npm run biome:ci

  test:
    name: Tests 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v4
      - name: Set up Node 🟢
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      - name: Run tests 🧪
        run: npm test
